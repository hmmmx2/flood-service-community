version: "3.9"

# ── Flood Community Service — local development stack ────────────────────────
# Starts: Spring Boot API + PostgreSQL + Redis
# Usage:  docker-compose up --build
# API:    http://localhost:4001

services:

  # ── Community API (Spring Boot) ────────────────────────────────────────────
  community-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flood-community-api
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: jdbc:postgresql://postgres:5432/flood_community?user=${DB_USER:-flood}&password=${DB_PASSWORD:-flood}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: ${NODE_ENV:-development}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@yourdomain.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - community-net

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flood-community-postgres
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoid clash with local Postgres)
    environment:
      POSTGRES_DB: flood_community
      POSTGRES_USER: ${DB_USER:-flood}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flood}
    volumes:
      - community_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flood} -d flood_community"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - community-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flood-community-redis
    ports:
      - "6380:6379"   # host 6380 → container 6379 (avoid clash with local Redis)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - community-net

volumes:
  community_postgres_data:
    name: flood_community_postgres

networks:
  community-net:
    name: flood-community-network
    driver: bridge
